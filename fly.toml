# Перед первым deploy поменяйте app на реальное имя Fly app, если оно будет другим.
app = "kgd80-registration"
primary_region = "waw"
kill_signal = "SIGINT"
kill_timeout = "30s"
swap_size_mb = 512

[build]
  dockerfile = "registration/Dockerfile"
  ignorefile = "registration/.dockerignore"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  SQLITE_PATH = "/data/registration.sqlite"
  LOCAL_PUBLIC_ROOT = "/data/public"
  TELEGRAM_WEBHOOK_PATH = "/api/v1/telegram/webhook"
  TICKETS_PREFIX = "tickets"
  EXPORTS_PREFIX = "exports"
  TZ = "Europe/Kaliningrad"
  S3_FORCE_PATH_STYLE = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 40

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/v1/health"

[[mounts]]
  source = "registration_data"
  destination = "/data"
  processes = ["app"]
  initial_size = "3gb"
  snapshot_retention = 14

[[restart]]
  policy = "always"
  retries = 10
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpus = 1
  cpu_kind = "shared"
